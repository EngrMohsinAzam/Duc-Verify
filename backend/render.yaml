# Render Blueprint — optional one-click backend deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: docverify-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        generateValue: true
      - key: DB_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: STORAGE_DRIVER
        value: db
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_USE_SSL
        value: "true"
