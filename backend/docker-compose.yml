services:
  postgres:
    image: postgres:15-alpine
    container_name: docverify-postgres
    environment:
      POSTGRES_DB: docverify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docverify"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: docverify-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: docverify-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/docverify --ignore-existing;
      mc anonymous set download local/docverify;
      exit 0;
      "

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docverify-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: postgres://postgres:secret@postgres:5432/docverify?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
